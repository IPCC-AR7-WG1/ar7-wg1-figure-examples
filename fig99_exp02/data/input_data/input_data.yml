notes: >
  The climatology and trends are calculated from climate-quality
  ocean-colour products generated as part of the Climate Change Initiative
  of the European Space Agency. These are multi-sensor products, with
  inter-sensor bias correction applied to minimise artefacts in trends,
  with processing algorithms selected after round-robin comparisons.